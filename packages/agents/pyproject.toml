[tool.poetry]
name = "living-contract-agents"
version = "0.1.0"
description = "LivingContract OS — Multi-Agent AI Pipeline"
authors = ["LivingContract OS Team"]
readme = "README.md"
packages = [{include = "living_contract"}]

[tool.poetry.dependencies]
python = "^3.11"
web3 = "^7.0.0"
openai = "^1.30.0"
pydantic = "^2.7.0"
pydantic-settings = "^2.3.0"
httpx = "^0.27.0"
redis = "^5.0.0"
python-dotenv = "^1.0.0"
eth-account = "^0.13.1"
fastapi = "^0.111.0"
uvicorn = {extras = ["standard"], version = "^0.30.0"}
tenacity = "^8.3.0"
structlog = "^24.1.0"

[tool.poetry.group.dev.dependencies]
pytest = "^8.2.0"
pytest-asyncio = "^0.23.0"
pytest-httpx = "^0.30.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
